# Пример vhost для poverka-48.ru
# root: /var/www/poverka48
# tg-proxy слушает 127.0.0.1:3378 (см. deploy/tg-proxy.service)

server {
    listen 80;
    server_name poverka-48.ru www.poverka-48.ru;

    root /var/www/poverka48;
    index index.html;
    charset utf-8;

    location / {
        try_files $uri $uri/ =404;
    }

    location = /robots.txt {
        try_files /robots.txt =404;
        default_type text/plain;
    }

    location = /sitemap.xml {
        try_files /sitemap.xml =404;
        default_type application/xml;
    }

    location ~* \.(?:css|js|mjs|jpg|jpeg|png|gif|svg|webp|ico|woff2?|map)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /tg-notify {
        proxy_pass http://127.0.0.1:3378;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 15s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
        client_max_body_size 256k;
    }

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
}
