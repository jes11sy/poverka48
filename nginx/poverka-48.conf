# =============================================================================
# poverka-48.ru — корень файлов: /var/www/poverka48
#
# Установка (на сервере):
#   cp /var/www/poverka48/nginx/poverka-48.conf /etc/nginx/sites-available/poverka-48.ru
#   ln -sf /etc/nginx/sites-available/poverka-48.ru /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# Сертификат (после того как DNS указывает на сервер):
#   1) Если сертификата ещё нет — закомментируйте блок server { listen 443 ... } ниже
#   2) nginx -t && systemctl reload nginx
#   3) certbot certonly --webroot -w /var/www/poverka48 -d poverka-48.ru -d www.poverka-48.ru
#   4) Раскомментируйте блок 443, снова: nginx -t && systemctl reload nginx
#
# Или одной командой (если активен только HTTP-блок):
#   certbot --nginx -d poverka-48.ru -d www.poverka-48.ru
#
# tg-proxy: 127.0.0.1:3378 (deploy/tg-proxy.service)
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name poverka-48.ru www.poverka-48.ru;

    root /var/www/poverka48;
    index index.html;
    charset utf-8;

    location ^~ /.well-known/acme-challenge/ {
        default_type text/plain;
        root /var/www/poverka48;
        allow all;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location = /robots.txt {
        try_files /robots.txt =404;
        default_type text/plain;
    }

    location = /sitemap.xml {
        try_files /sitemap.xml =404;
        default_type application/xml;
    }

    location ~* \.(?:css|js|mjs|jpg|jpeg|png|gif|svg|webp|ico|woff2?|map)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /tg-notify {
        proxy_pass http://127.0.0.1:3378;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 15s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
        client_max_body_size 256k;
    }

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name poverka-48.ru www.poverka-48.ru;

    ssl_certificate     /etc/letsencrypt/live/poverka-48.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/poverka-48.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/poverka48;
    index index.html;
    charset utf-8;

    location ^~ /.well-known/acme-challenge/ {
        default_type text/plain;
        root /var/www/poverka48;
        allow all;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location = /robots.txt {
        try_files /robots.txt =404;
        default_type text/plain;
    }

    location = /sitemap.xml {
        try_files /sitemap.xml =404;
        default_type application/xml;
    }

    location ~* \.(?:css|js|mjs|jpg|jpeg|png|gif|svg|webp|ico|woff2?|map)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /tg-notify {
        proxy_pass http://127.0.0.1:3378;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 15s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
        client_max_body_size 256k;
    }

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
}
